<!DOCTYPE html>
<html>
<head>
<title>Task Manager</title>
</head>

<body>

<h1>Task Manager</h1>

<input id="taskTitle" placeholder="Enter task"/>

<button onclick="createTask()">Add Task</button>

<script>

async function createTask(){

const title=document.getElementById("taskTitle").value;

const response=await fetch("https://750tusedy6.execute-api.ap-south-2.amazonaws.com/dev",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
title:title
})

});

const data=await response.json();

alert(data.message);

}

</script>

</body>
</html>
