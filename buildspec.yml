version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.11

  pre_build:
    commands:
      - echo Installing dependencies
      - ls -la

  build:
    commands:
      - echo Packaging Lambda
      - zip -r lambda_function.zip lambda_function.py

  post_build:
    commands:
      - echo Running tests
      - python lambda_function.py || true

artifacts:
  files:
    - lambda_function.zip
    - index.html
